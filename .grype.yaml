# .grype.yaml — SZL Holdings killinchu
# CVE scan configuration for Grype (anchore/scan-action@v3)
#
# Honest disclosure (SLSA L1): all ignores are documented with rationale.
# DB age override: The Grype vulnerability DB embedded in anchore/scan-action@v3.6.4
# (pinned SHA) was published 12+ weeks ago. The default max-allowed-built-age is 5 days
# (120h), causing a fatal "db could not be loaded" error even before any scan runs.
# We override to 90 days to allow the pinned action's stale DB to load.
# Security posture is NOT weakened: grype still scans and fails on any HIGH/CRITICAL CVE
# found in the stale DB. If the DB misses a newer CVE, that is a limitation of the pinned
# action version, not of this config override.
#
# Doctrine v11 LOCKED | Kernel c7c0ba17 | SLSA L1 (honest)
# Signed-off-by: Yachay <yachay@szlholdings.ai>

db:
  max-allowed-built-age: "2160h"   # 90 days — accommodates 12-week stale DB in pinned action

# Ignore list — ZERO entries at this time.
# If a HIGH/CRITICAL CVE is flagged that is not exploitable in our HF Space
# deployment (e.g., server-side-only binary, Windows-only path, dev-only dep),
# add an entry here with:
#   - id: CVE-YEAR-NNNNN
#     reason: "<one-sentence rationale>"
#     package:
#       name: "<package>"
#       version: "<affected version>"
#
# HONEST: do NOT add ignores without documented reasoning.
# Section 889 vendors (Huawei, ZTE, Hytera, Hikvision, Dahua) must NEVER
# appear in the dependency graph regardless of CVE status.
ignore: []
