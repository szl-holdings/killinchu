# .grype.yaml — SZL Holdings killinchu
# CVE scan configuration for Grype (anchore/scan-action@v3)
#
# Honest disclosure (SLSA L1): all ignores are documented with rationale.
# DB age override: CI runners download a fresh DB at scan time; the stale-DB
# error ("db could not be loaded: built N weeks ago") is a Grype bootstrap
# issue not a vulnerability. We raise the max-allowed-built-age to avoid
# CI failures from stale cached DBs. Security posture is unaffected because
# anchore/scan-action always fetches the latest DB when possible.
#
# Doctrine v11 LOCKED | Kernel c7c0ba17 | Signed-off-by: Yachay <yachay@szlholdings.ai>

db:
  max-allowed-built-age: "120h"   # 5 days — matches Grype default but explicit

# Ignore list — ZERO entries at this time.
# If a HIGH/CRITICAL CVE is flagged that is not exploitable in our HF Space
# deployment (e.g., server-side-only binary, Windows-only path, dev-only dep),
# add an entry here with:
#   - id: CVE-YEAR-NNNNN
#     reason: "<one-sentence rationale>"
#     package:
#       name: "<package>"
#       version: "<affected version>"
#
# HONEST: do NOT add ignores without documented reasoning.
# Section 889 vendors (Huawei, ZTE, Hytera, Hikvision, Dahua) must NEVER
# appear in the dependency graph regardless of CVE status.
ignore: []
