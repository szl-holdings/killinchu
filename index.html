<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>killinchu — counter-UAS air domain</title>
<meta name="description" content="Drone-fleet air-domain scene: tracks, classification, Lambda-gated verdicts. Air sibling of vessels. Doctrine v11."/>
<style>
 :root{--bg:#060a14;--fg:#e8ecf6;--accent:#5ad1ff;--accent2:#8b7bff;--red:#ff7a93;--green:#7CFFB2;--dim:#5b6478;}
 html,body{margin:0;height:100%;background:var(--bg);color:var(--fg);font-family:'Inter',system-ui,sans-serif;overflow:hidden;}
 #c{position:fixed;inset:0;display:block;}
 .hud{position:fixed;left:18px;top:16px;z-index:5;pointer-events:none;}
 .hud h1{font-size:15px;font-weight:600;letter-spacing:.12em;margin:0;text-transform:uppercase;}
 .hud p{margin:4px 0 0;font-size:12px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
 .legend{position:fixed;right:16px;bottom:14px;z-index:5;font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;text-align:right;line-height:1.8;}
 .legend b{color:var(--accent);}.legend .r{color:var(--red);}.legend .g{color:var(--green);}
 .tip{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:5;font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace;}
</style></head><body>
<canvas id="c"></canvas>
<div class="hud"><h1>killinchu air domain</h1><p>counter-UAS rule engine · Lambda-gated verdicts · doctrine v11</p></div>
<div class="legend">
 <div><b>cyan</b> = friendly / unknown track</div>
 <div><span class="r">red</span> = ENGAGE-DENY (bounded)</div>
 <div><span class="g">green</span> = 13-axis yuyay PASS</div>
</div>
<div class="tip">drag to orbit · each contrail is a CoT track · verdicts Khipu-receipted</div>
<script type="importmap">{ "imports": {
 "three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
 "three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" }}</script>
<script type="module">
import * as THREE from 'three';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';
const canvas=document.getElementById('c');
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
const scene=new THREE.Scene(); scene.fog=new THREE.FogExp2(0x060a14,0.01);
const camera=new THREE.PerspectiveCamera(58,1,0.1,800); camera.position.set(0,26,60);
const controls=new OrbitControls(camera,canvas); controls.enableDamping=true; controls.target.set(0,6,0);
controls.autoRotate=true; controls.autoRotateSpeed=0.4; controls.minDistance=20; controls.maxDistance=200;
// terrain grid (Andean ridge)
const grid=new THREE.GridHelper(140,40,0x1b3a5e,0x12263f); scene.add(grid);
const ridge=new THREE.Mesh(new THREE.ConeGeometry(18,22,5),new THREE.MeshStandardMaterial({color:0x0e1c30,metalness:.1,roughness:1,flatShading:true}));
ridge.position.set(-20,11,-20); scene.add(ridge);
const ridge2=ridge.clone(); ridge2.scale.set(.7,.8,.7); ridge2.position.set(22,9,12); scene.add(ridge2);
// drone fleet
function rng(s){return()=>{s|=0;s=s+0x6D2B79F5|0;let t=Math.imul(s^s>>>15,1|s);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}
const r=rng(killinchuSeed());function killinchuSeed(){return 13149;}
const drones=[]; const NF=14;
for(let i=0;i<NF;i++){ const hostile=r()<0.3;
 const body=new THREE.Group();
 const core=new THREE.Mesh(new THREE.OctahedronGeometry(0.8,0),new THREE.MeshStandardMaterial({color:hostile?0xff7a93:0x5ad1ff,emissive:hostile?0x4d1322:0x123a4d,emissiveIntensity:1.4}));
 body.add(core);
 // rotor ring
 const ring=new THREE.Mesh(new THREE.TorusGeometry(1.3,0.06,8,24),new THREE.MeshBasicMaterial({color:hostile?0xff7a93:0x5ad1ff,transparent:true,opacity:.5})); ring.rotation.x=Math.PI/2; body.add(ring);
 const base=new THREE.Vector3((r()-0.5)*100,8+r()*22,(r()-0.5)*100);
 body.position.copy(base); body.userData={base,phase:r()*6.28,hostile,spd:0.3+r()*0.5};
 scene.add(body); drones.push(body);
 // contrail
 const trail=new THREE.Line(new THREE.BufferGeometry().setFromPoints([base.clone(),base.clone().add(new THREE.Vector3(0,0,-6))]),new THREE.LineBasicMaterial({color:hostile?0xff7a93:0x5ad1ff,transparent:true,opacity:.25}));
 body.userData.trail=trail; scene.add(trail);
}
// yuyay gate dome (13-axis)
const dome=new THREE.Mesh(new THREE.SphereGeometry(46,32,16,0,Math.PI*2,0,Math.PI/2),new THREE.MeshBasicMaterial({color:0x7CFFB2,transparent:true,opacity:0.04,side:THREE.DoubleSide}));
scene.add(dome);
scene.add(new THREE.AmbientLight(0x33507f,1.0));
const l=new THREE.PointLight(0x8b7bff,300,300); l.position.set(0,60,40); scene.add(l);
function resize(){const w=innerWidth,h=innerHeight;renderer.setSize(w,h,false);camera.aspect=w/h;camera.updateProjectionMatrix();}
addEventListener('resize',resize);resize();
const clock=new THREE.Clock();
function animate(){requestAnimationFrame(animate);const t=clock.getElapsedTime();
 drones.forEach(dn=>{const u=dn.userData; dn.position.x=u.base.x+Math.sin(t*u.spd+u.phase)*8; dn.position.z=u.base.z+Math.cos(t*u.spd*0.7+u.phase)*8; dn.position.y=u.base.y+Math.sin(t*0.8+u.phase)*1.5; dn.rotation.y=t*1.5;
  const p=dn.userData.trail.geometry.attributes.position; p.setXYZ(0,dn.position.x,dn.position.y,dn.position.z); p.setXYZ(1,dn.position.x,dn.position.y,dn.position.z-7); p.needsUpdate=true; });
 controls.update(); renderer.render(scene,camera);}
animate();
</script></body></html>
