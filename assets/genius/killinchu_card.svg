<svg xmlns="http://www.w3.org/2000/svg" width="760" height="240" viewBox="0 0 760 240" role="img" aria-label="killinchu · counter-UAS rule engine">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070912"/><stop offset="1" stop-color="#0d1322"/>
    </linearGradient>
    <linearGradient id="ln" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5ad1ff"/><stop offset="1" stop-color="#8b7bff"/>
    </linearGradient>
    <style>
      text{ font-family:'Inter','IBM Plex Sans',system-ui,sans-serif; }
      .title{ font-size:21px; font-weight:700; fill:#e8ecf6; letter-spacing:.01em; }
      .sub{ font-size:12.5px; fill:#8893ad; font-family:'JetBrains Mono',monospace; }
      .val{ font-size:36px; font-weight:700; fill:#5ad1ff;
             font-family:'JetBrains Mono',monospace; opacity:1; }
      .lab{ font-size:11.5px; fill:#8893ad; letter-spacing:.06em; text-transform:uppercase; }
      .foot{ font-size:11px; fill:#8893ad; font-family:'JetBrains Mono',monospace; }
      .flow{ stroke-dasharray:14 10; }
    </style>
  </defs>
  <rect width="760" height="240" rx="16" fill="url(#bg)" stroke="#19223a"/>
  <line class="flow" x1="24" y1="76" x2="736" y2="76" stroke="url(#ln)" stroke-width="2.5" stroke-linecap="round"><animate attributeName="stroke-dashoffset" values="0;-48" dur="1.6s" repeatCount="indefinite"/></line>
  <text class="title" x="30" y="44">killinchu · counter-UAS rule engine</text>
  <text class="sub" x="30" y="64">Andean drone-intelligence · air sibling of vessels · doctrine v11</text>
  
  <g transform="translate(147,132)" text-anchor="middle">
    <text class="val" y="0">13<animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.0s" repeatCount="indefinite"/></text>
    <text class="lab" y="30">axes</text>
  </g>
  <g transform="translate(380,132)" text-anchor="middle">
    <text class="val" y="0">14<animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.18s" repeatCount="indefinite"/></text>
    <text class="lab" y="30">axioms</text>
  </g><line x1="263" y1="104" x2="263" y2="150" stroke="#19223a"/>
  <g transform="translate(613,132)" text-anchor="middle">
    <text class="val" y="0">Λ<animate attributeName="opacity" values="0.55;1;0.55" dur="2.4s" begin="0.36s" repeatCount="indefinite"/></text>
    <text class="lab" y="30">gate</text>
  </g><line x1="497" y1="104" x2="497" y2="150" stroke="#19223a"/>
  <text class="foot" x="30" y="222">every detection gated through the Λ-aggregator · DSSE receipt per verdict · Cesium air-domain scene</text>
  <circle cx="726" cy="34" r="6" fill="#5ad1ff"><animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/></circle>
</svg>