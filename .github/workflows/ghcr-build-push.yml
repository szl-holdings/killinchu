name: GHCR Build + Push (uds-v0.2.0)
# Builds the root Dockerfile and pushes to ghcr.io/szl-holdings/<repo>.
# Unblocks Warhacker UDS bundle chain (FA-01).
# Uses GHCR_TOKEN PAT (write:packages) with correct user login for GHCR auth.
# GHCR requires: username = PAT owner, password = PAT (not GITHUB_TOKEN for new org packages).
# DCO: Signed-off-by: Yachay <yachay@szlholdings.ai>
on:
  push:
    branches: [main]
    tags: ['v*', 'uds-v*']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
  id-token: write   # for keyless cosign
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: stephenlutar2-hash
          password: ${{ secrets.GHCR_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/szl-holdings/${{ github.event.repository.name }}
          tags: |
            type=raw,value=uds-v0.2.0
            type=raw,value=latest
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
      - name: Build + push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
      - uses: sigstore/cosign-installer@053f9b74638557590800a301da1ba82351507e2c # v3.8.1
      - name: Cosign sign keyless
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            cosign sign --yes "$tag"
          done
