name: GHCR Build + Push (uds-v0.2.0)
# Builds the root Dockerfile and pushes to ghcr.io/szl-holdings/<repo>.
# Unblocks Warhacker UDS bundle chain (FA-01).
# Uses GHCR_TOKEN (PAT with write:packages) for org GHCR push.
# DCO: Signed-off-by: Yachay <yachay@szlholdings.ai>
on:
  push:
    branches: [main]
    tags: ['v*', 'uds-v*']
  workflow_dispatch:
permissions:
  contents: read
  packages: write
  id-token: write   # for keyless cosign
jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR (PAT for org package creation)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/szl-holdings/${{ github.event.repository.name }}
          tags: |
            type=raw,value=uds-v0.2.0
            type=raw,value=latest
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
      - uses: sigstore/cosign-installer@v3
      - name: Cosign sign keyless
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          for tag in ${{ steps.meta.outputs.tags }}; do
            cosign sign --yes "$tag"
          done
