name: copy-sync lockstep guard

# PERMANENT CI guard (Doctrine v11). Stops the recurring failure that broke the
# SZL estate three times on 2026-06-13: a module/asset is added to GitHub and
# referenced (an `import` in serve.py, or a Dockerfile `COPY`) but is NOT in BOTH
# the Dockerfile COPY set AND the hf-sync mirror set — so the HF Space either
# BUILD_ERRORs (COPY of a file the Space never received) or silently serves a stub
# (a try/except-guarded import falls back because the module was never in the image).
#
# This ADDS a gate (it never weakens dockerfile-copy-guard / hf-module-drift /
# hf-sync-backend). The checker lives in tools/check_copy_sync_lockstep.py (stdlib
# only, ast for imports) and cross-checks three sets in one pass:
#   CHECK 1  every Dockerfile COPY/ADD source exists in the repo.
#   CHECK 2  every LOCAL .py module serve.py imports (transitively) is in the COPY set.
#   CHECK 3  every non-.py asset COPY'd PER-FILE is in the hf-sync mirror set
#            (on.push.paths / front-door globs) or declared image-only in
#            .github/copy-sync-lockstep.json.
# Any violation FAILS the job with a clear, file-named message.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lockstep:
    name: COPY <-> serve.py imports <-> hf-sync mirror are in lockstep
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
      - name: Byte-validate the checker (ast.parse) before running it
        run: python3 -c "import ast,sys; ast.parse(open('tools/check_copy_sync_lockstep.py').read()); print('checker ast OK')"
      - name: Run copy-sync lockstep guard
        run: python3 tools/check_copy_sync_lockstep.py .
