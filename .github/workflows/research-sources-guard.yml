name: Research & Sources guard

# Guards the per-tab "Research & Sources" panel (Task #662). serve.py is a
# god-file that siblings + CI edit concurrently; this guard boots the REAL app
# in-process (FastAPI/Starlette TestClient) and proves no edit can silently:
#   * drop the killinchu_research_sources registration,
#   * leave a representative /elite tab with zero sources,
#   * let /api/killinchu/v1/research/{tab} fall through to the SPA HTML shell, or
#   * remove the window.__renderResearch helper / either injection call site in
#     killinchu_elite_console.py.
# Offline: pure-stdlib module under test; no network, no key.

on:
  push:
    branches: [main]
    paths:
      - killinchu_research_sources.py
      - serve.py
      - killinchu_elite_console.py
      - tests/test_research_sources_guard.py
      - .github/workflows/research-sources-guard.yml
  pull_request:
    branches: [main]
    paths:
      - killinchu_research_sources.py
      - serve.py
      - killinchu_elite_console.py
      - tests/test_research_sources_guard.py
      - .github/workflows/research-sources-guard.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research-sources-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install test deps
        run: python -m pip install --disable-pip-version-check pytest fastapi httpx
      - name: Run Research & Sources guard (offline, no network, no key)
        run: python -m pytest tests/test_research_sources_guard.py -q
