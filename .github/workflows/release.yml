name: release

# Auto-release: on main push, bump a simple counter version, tag, create a GitHub
# release, sign artifacts with cosign keyless OIDC, and generate SLSA L1 provenance.
# ADDITIVE. Doctrine v11 LOCKED 749/14/163 locked_at c7c0ba17
# Action SHAs pinned 2026-06-03 by Auditor BETA (Beta-iter4)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write      # cosign keyless + SLSA OIDC
  packages: read

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Compute next version (simple counter)
        id: bump
        run: |
          git fetch --tags
          LAST=$(git tag --list 'v0.*' --sort=-v:refname | head -1)
          if [ -z "$LAST" ]; then NEXT=1; else NEXT=$(( ${LAST##*.} + 1 )); fi
          TAG="v0.1.${NEXT}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Next tag: $TAG"

      - name: Build release artifact (deterministic tarball)
        run: |
          mkdir -p dist
          tar --sort=name --mtime='UTC 2020-01-01' --owner=0 --group=0 --numeric-owner \
              --exclude='./.git' --exclude='./dist' -czf dist/source-${{ steps.bump.outputs.tag }}.tar.gz . || true
          ls -la dist

      - name: Generate subject hashes (for SLSA)
        id: hash
        run: |
          cd dist
          echo "hashes=$(sha256sum * | base64 -w0)" >> "$GITHUB_OUTPUT"

      - name: Create tag + GitHub release
        id: gh_release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          generate_release_notes: true
          files: dist/*

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign artifacts (cosign keyless OIDC)
        run: |
          for f in dist/*; do
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.crt" "$f"
          done

      - name: Attach signatures to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          files: |
            dist/*.sig
            dist/*.crt

  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@5a775b367a56d5bd118a224a811bba288150a563 # v2.0.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true
      provenance-name: "provenance-${{ needs.release.outputs.tag }}.intoto.jsonl"
