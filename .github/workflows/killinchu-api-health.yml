# killinchu-api-health.yml — standing health check for killinchu's LIVE API.
# Doctrine v11 LOCKED 749/14/163 | SLSA L1 honest
# Signed-off-by: Yachay <yachay@szlholdings.ai>
#
# Complements (does NOT replace) smoke-monitor.yml: that one only asserts HTTP
# 200 on the HF Space front-doors. This one asserts the deployed /api/killinchu/*
# endpoints keep returning JSON (content-type application/json) carrying the
# Doctrine v11 envelope {status, citations, fetchedAt} — i.e. it catches the
# regression where the SPA HTML is served with a 200 instead of the real API
# payload. Runs against BOTH live targets (box host killinchu.a11oy.net + HF
# Space szlholdings-killinchu.hf.space), tolerant of transient rebuild states
# (bounded retries), and alerts the team via the shared ntfy channel on a
# sustained failure.
#
# Org policy compliance: github-owned actions only, SHA-pinned; checker is
# stdlib-only Python (no pip install, no third-party action); alert posts a
# Slack-compatible payload via raw curl to the shared webhook (soft-skips if the
# secret is unset — the red run still stands as the signal).

name: Killinchu API Health

on:
  schedule:
    - cron: '20 */6 * * *'   # every 6h, offset from smoke-monitor (0 */6)
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual trigger reason'
        required: false
        default: 'manual check'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  self-test:
    name: Validator self-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Run validator self-test (proves it catches SPA-HTML / missing-field)
        run: python3 scripts/test_check_killinchu_api_health.py

  health:
    name: Live API health (box + HF Space)
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

      - name: Probe live killinchu API on both targets
        id: probe
        run: |
          set +e
          python3 scripts/check_killinchu_api_health.py \
            --target "box=https://killinchu.a11oy.net" \
            --target "hf=https://szlholdings-killinchu.hf.space" \
            --summary-file /tmp/killinchu-api-health.json | tee /tmp/probe.log
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          if [ -f /tmp/killinchu-api-health.json ]; then
            checked=$(python3 -c "import json;print(json.load(open('/tmp/killinchu-api-health.json'))['checked'])")
            passed=$(python3 -c "import json;print(json.load(open('/tmp/killinchu-api-health.json'))['passed'])")
            failed=$(python3 -c "import json;print(json.load(open('/tmp/killinchu-api-health.json'))['failed'])")
            echo "checked=$checked" >> "$GITHUB_OUTPUT"
            echo "passed=$passed" >> "$GITHUB_OUTPUT"
            echo "failed=$failed" >> "$GITHUB_OUTPUT"
          fi
          {
            echo "### Killinchu live API health"
            echo ""
            echo '```'
            cat /tmp/probe.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          # Do NOT fail here — the final gate fails the run, so the alert step
          # (which is gated on this exit_code) always gets a chance to run first.
          exit 0

      - name: Alert the team on sustained API failure
        if: ${{ always() && steps.probe.outputs.exit_code != '0' }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPO: ${{ github.repository }}
          CHECKED: ${{ steps.probe.outputs.checked }}
          PASSED: ${{ steps.probe.outputs.passed }}
          FAILED: ${{ steps.probe.outputs.failed }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "::warning::SLACK_WEBHOOK_URL secret not configured — skipping direct alert. The failed run still stands as the signal."
            exit 0
          fi

          fails="$(python3 -c "import json;d=json.load(open('/tmp/killinchu-api-health.json'));print(chr(10).join('- %s %s: %s' % (f['target'], f['path'], f['reason']) for f in d['failures']))" 2>/dev/null || echo '(per-check breakdown unavailable)')"

          # Compose with real newlines, then JSON-encode safely with jq
          # (preinstalled on ubuntu-latest). The shared webhook is the team ntfy
          # channel (via the szl-alert-relay); it renders the `text` field.
          text=":rotating_light: *Killinchu live API health FAILED* — one or more /api/killinchu/* endpoints stopped returning a valid Doctrine v11 JSON envelope in ${REPO}.
          *Counts:* checked=${CHECKED:-?} passed=${PASSED:-?} failed=${FAILED:-?}
          *Failing checks:*
          ${fails}
          *Run:* ${RUN_URL}"

          payload=$(jq -n --arg text "$text" '{text: $text}')
          echo "Posting killinchu-api-health alert to the shared webhook..."
          code=$(curl -sS -o /tmp/resp.txt -w '%{http_code}' \
                   -X POST -H 'Content-Type: application/json' \
                   --max-time 20 --data "${payload}" "${SLACK_WEBHOOK_URL}")
          echo "Webhook responded HTTP ${code}."
          if [ "${code}" -lt 200 ] || [ "${code}" -ge 300 ]; then
            echo "::error::Alert webhook POST failed (HTTP ${code}): $(cat /tmp/resp.txt)"
            exit 1
          fi
          echo "Direct alert delivered."

      - name: Fail the run on sustained API failure
        if: always()
        run: |
          code="${{ steps.probe.outputs.exit_code }}"
          if [ "$code" != "0" ]; then
            echo "::error::Killinchu live API health check failed — see the run summary for the per-check breakdown."
            exit 1
          fi
          echo "Killinchu live API healthy on all targets."
