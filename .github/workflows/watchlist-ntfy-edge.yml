name: Watchlist NTFY anti-spam

# Guards the watchlist alert anti-spam contract (Task #599): a standing
# condition that keeps firing must page the shared ntfy channel ONCE on the
# clear->fire edge, never on every crawl. Drives the real _evaluate_watchlists
# against a temp SQLite DB with a monkeypatched raw sender (no network).

on:
  push:
    branches: [main]
    paths:
      - killinchu_backend.py
      - tests/test_watchlist_ntfy_edge.py
      - .github/workflows/watchlist-ntfy-edge.yml
  pull_request:
    branches: [main]
    paths:
      - killinchu_backend.py
      - tests/test_watchlist_ntfy_edge.py
      - .github/workflows/watchlist-ntfy-edge.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  watchlist-ntfy-edge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --disable-pip-version-check pytest
      - name: Run watchlist ntfy anti-spam test
        run: python -m pytest tests/test_watchlist_ntfy_edge.py -q
