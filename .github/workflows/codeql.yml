name: CodeQL

# FIX (Yachay, empire-reliability 2026-06-01): two stacked root causes made this fail.
#  (1) The caller used the org reusable-codeql workflow with its default language
#      'javascript-typescript'. killinchu is a docs/config-only repo (CITATION.cff,
#      LICENSE, README.md) with no JS/TS source, so CodeQL found nothing to analyse.
#  (2) Even after switching to the `actions` language, the reusable workflow always
#      *uploads* SARIF to GitHub code scanning. killinchu is a PRIVATE repo without
#      GitHub Advanced Security / Code Security, so the upload returned a configuration
#      error ("Code Security must be enabled for this repository to use code scanning").
#
# Root-cause fix: run CodeQL self-contained (matching the working public `terra`
# pattern) over the `actions` language, but with `upload: false`. The analysis still
# runs and validates the workflow files; we simply do not push SARIF to a code-scanning
# backend that this private repo tier does not provide. If GHAS is later enabled on
# killinchu, flip `upload` back to the default to surface results in the Security tab.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 4 * * 1'

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [actions]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          languages: ${{ matrix.language }}
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          category: "/language:${{ matrix.language }}"
          # PRIVATE repo without GHAS Code Security cannot receive SARIF uploads.
          upload: false
