name: SLSA L2 Container Provenance (slsa-verifier path — optional, pending Wire D)

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Set to "yes" only when Wire D (public Rekor) is live'
        required: true
        default: 'no'

jobs:
  optional-slsa-verifier-path-pending-wire-d:
    if: ${{ github.event.inputs.force_run == 'yes' }}
    runs-on: ubuntu-latest
    steps:
      - name: Explain
        run: |
          echo "L2 is ALREADY attested via actions/attest-build-provenance (gh attestation verify / cosign verify-attestation)."
          echo "This optional slsa-github-generator + slsa-verifier path additionally requires public Rekor (Wire D)."
          echo "See .compliance/SLSA_LEVEL.md for the authoritative honest status."
