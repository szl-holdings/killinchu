name: Sync to HuggingFace Space
on:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add space https://oauth2:$HF_TOKEN@huggingface.co/spaces/SZLHOLDINGS/${{ github.event.repository.name }}
          git fetch space main || true
          git push space main
