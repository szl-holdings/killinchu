name: Sync to HuggingFace Space
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: false
          token: ${{ github.token }}
      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "yachay@szlholdings.ai"
          git config --global user.name "Yachay"
          git remote add space https://user:${HF_TOKEN}@huggingface.co/spaces/SZLHOLDINGS/${{ github.event.repository.name }}
          git fetch space main || true
          git push space main --force
