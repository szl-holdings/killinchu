#
# hf-token-preflight — fail LOUDLY when the HuggingFace write credential is missing.
#
# WHY
#   The Space sync (hf-sync.yml) needs the HF_WRITE_TOKEN repo secret. If it is
#   absent the Space card silently stops updating and eventually drifts. This
#   preflight runs on every push to main and on demand; it does NOT skip when the
#   secret is missing — it fails the run with a precise founder action so a
#   missing credential is impossible to miss. The secret VALUE is never printed.

name: hf-token-preflight

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - ".github/workflows/hf-sync.yml"
      - ".github/workflows/hf-token-preflight.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  assert-hf-token:
    name: Assert HF_WRITE_TOKEN present (loud-fail, no silent skip)
    runs-on: ubuntu-latest
    steps:
      - name: Fail loudly if HF_WRITE_TOKEN is unset
        env:
          HF_WRITE_TOKEN: ${{ secrets.HF_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${HF_WRITE_TOKEN:-}" ]; then
            echo "::error title=HF_WRITE_TOKEN missing::The HF_WRITE_TOKEN repo secret is NOT set on szl-holdings/killinchu."
            echo "::error::hf-sync.yml CANNOT push the Space card without it; the HuggingFace Space SZLHOLDINGS/killinchu will drift."
            echo "::error::FOUNDER ACTION: add repo secret HF_WRITE_TOKEN — a HuggingFace WRITE token with org-write to SZLHOLDINGS."
            echo "::error::URL: https://github.com/szl-holdings/killinchu/settings/secrets/actions/new"
            {
              echo "### hf-token-preflight: FAILED"
              echo "Secret **HF_WRITE_TOKEN** is missing. hf-sync would fail mid-run."
              echo ""
              echo "**Founder action:** add repo secret \`HF_WRITE_TOKEN\` (HF write token, org-write to \`SZLHOLDINGS\`) at"
              echo "<https://github.com/szl-holdings/killinchu/settings/secrets/actions/new>"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "HF_WRITE_TOKEN is present (value not printed). hf-sync can proceed."
          {
            echo "### hf-token-preflight: OK"
            echo "Secret \`HF_WRITE_TOKEN\` is present. hf-sync to \`SZLHOLDINGS/killinchu\` is unblocked."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Validate token can reach HuggingFace (non-fatal probe)
        if: success()
        env:
          HF_WRITE_TOKEN: ${{ secrets.HF_WRITE_TOKEN }}
        run: |
          set -euo pipefail
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${HF_WRITE_TOKEN}" \
            https://huggingface.co/api/whoami-v2 || echo "000")
          if [ "$code" = "200" ]; then
            echo "HF token validated (whoami-v2 200)."
          else
            echo "::warning::HF whoami-v2 returned $code — token present but could not be validated (non-fatal)."
          fi
