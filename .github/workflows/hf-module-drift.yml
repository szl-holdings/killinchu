name: HF Space module-drift guard

# The live Hugging Face Space (SZLHOLDINGS/killinchu) is built by Dockerfile COPY from this
# GitHub repo (szl-holdings/killinchu), but the Space's files can also be edited directly on HF.
# When either side moves and the other is forgotten, the source-of-truth and the
# deployed demo silently diverge -- in EITHER direction.
#
# This guard parses every COPY source in the Dockerfile(s), compares git-blob
# OIDs against the live HF Space tree, and on any divergence NAMES which side is
# ahead (by last-commit date). It never auto-overwrites -- a human picks the
# source of truth and reconciles. It is a ratchet: the pre-existing backlog lives
# in .github/hf-module-drift-allow.json (printed as warnings every run); any NEW
# drift fails the job. Sibling of shared-file-drift.yml / dockerfile-copy-guard.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '52 6 * * 1'  # Mondays 06:52 UTC (HF-side edits land with no GitHub push)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hf-module-drift:
    name: szl-holdings/killinchu source in sync with live HF Space SZLHOLDINGS/killinchu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout szl-holdings/killinchu (this repo)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Compare COPY'd modules against the live HF Space
        env:
          GITHUB_TOKEN: ${{ github.token }}  # commit-date lookups (which side is ahead)
        run: >-
          python3 .github/hf-module-drift-check.py
          --repo-root .
          --github-repo szl-holdings/killinchu
          --hf-repo SZLHOLDINGS/killinchu
          --allow .github/hf-module-drift-allow.json
          --report-out hf-module-drift-report.out.json
      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: hf-module-drift-report
          path: hf-module-drift-report.out.json
          if-no-files-found: ignore
