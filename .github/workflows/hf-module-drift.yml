name: HF Space module-drift guard

# szl-holdings/killinchu's live Hugging Face Space (SZLHOLDINGS/killinchu) is
# built by Dockerfile COPY from this repo, but the Space's files can also be
# edited directly on HF, so a COPY'd module can silently diverge between this
# source of truth and the live Space -- in EITHER direction.
#
# The checker now lives ONCE in szl-holdings/.github (alongside the org-wide
# license/lockfile/dead-link guards) and this repo delegates to the reusable
# workflow instead of vendoring its own copy -- so a fix to the guard reaches
# every HF-backed repo at once. This repo keeps only its own ratchet allowlist
# (.github/hf-module-drift-allow.json): known drift warns, any NEW drift fails.
# The org-wide scheduled sweep (szl-holdings/.github hf-module-drift-check.yml)
# is the catch-all safety net.

# Schedule-only by design (flood remediation, 2026-06-08): this guard exists to
# catch HF-SIDE edits that land with NO GitHub push, so a push/PR trigger added
# nothing but noise -- every routine deploy fired it and any transient HF rebuild
# (502/503) during the run counted as drift. Weekly cron + manual dispatch is
# exactly the cadence its purpose requires.
on:
  schedule:
    - cron: '52 6 * * 1'  # Mondays 06:52 UTC (HF-side edits land with no GitHub push)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hf-module-drift:
    uses: szl-holdings/.github/.github/workflows/reusable-hf-module-drift-check.yml@main
    with:
      hf-repo: SZLHOLDINGS/killinchu
