# SPDX-License-Identifier: Apache-2.0
# © 2026 SZL Holdings. Build + push the killinchu container image to GHCR and
# sign it with cosign (keyless, GitHub OIDC + Fulcio + Rekor).
# Commit DCO-signed: git commit -s -m "ci(killinchu): add build-uds-image workflow"
name: build-uds-image
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'image tag'
        required: true
        default: 'uds-v0.2.0'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ghcr.io/szl-holdings/${{ github.event.repository.name }}:${{ inputs.tag }}
      - uses: sigstore/cosign-installer@053f9b74638557590800a301da1ba82351507e2c # v3.8.1
      - name: cosign sign
        run: cosign sign --yes ghcr.io/szl-holdings/${{ github.event.repository.name }}:${{ inputs.tag }}
        env:
          COSIGN_EXPERIMENTAL: "1"
