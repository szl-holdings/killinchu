name: HF bucket self-test

# Network-free stdlib self-test for the shared Hugging Face Dataset "bucket"
# client (szl_hf_bucket.py). The module is BYTE-IDENTICAL across a11oy and
# killinchu (enforced by shared-file-drift via the Dockerfile COPY list); this
# workflow is likewise byte-identical in both repos. It runs the injected-
# transport unit tests (idempotency, content-addressed dedup, offline queue +
# flush, retry/backoff, honest status) with NO network and NO huggingface_hub
# install required — construction is side-effect-free and the live Hub path is
# exercised separately via a real smoke test, never in CI.

on:
  push:
    branches: [main]
    paths:
      - szl_hf_bucket.py
      - test_szl_hf_bucket.py
      - .github/workflows/hf-bucket-selftest.yml
  pull_request:
    branches: [main]
    paths:
      - szl_hf_bucket.py
      - test_szl_hf_bucket.py
      - .github/workflows/hf-bucket-selftest.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selftest:
    name: szl_hf_bucket stdlib self-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'
      - name: Run self-test (offline, stdlib only)
        run: python3 test_szl_hf_bucket.py
