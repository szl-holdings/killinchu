name: SBOM — CycloneDX via Syft

# SPDX-License-Identifier: Apache-2.0
# © 2026 Lutar, Stephen P. — SZL Holdings · ORCID 0009-0001-0110-4173
# Doctrine v11 LOCKED 749/14/163 · Λ = Conjecture 1 · SLSA L1 honest
#
# FIX (stephenlutar2-hash, 2026-06-04 v2): anchore/sbom-action v0.24.0 requires
# security-events:write for SARIF upload. For private repos without GHAS, the
# simpler path is to use Syft CLI directly and upload the SBOM as an artifact.
# This avoids the anchore/sbom-action action entirely for push triggers.

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.1.0

      - name: Generate SBOM (CycloneDX JSON)
        run: |
          syft dir:. --output cyclonedx-json=sbom.cdx.json
          echo "SBOM generated: $(wc -c < sbom.cdx.json) bytes"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ef09cdac3e2d3e60d8ccadda691f4f1cec5035cb # v4.4.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
