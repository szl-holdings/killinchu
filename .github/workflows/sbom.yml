name: SBOM — CycloneDX via Syft

# SPDX-License-Identifier: Apache-2.0
# © 2026 Lutar, Stephen P. — SZL Holdings · ORCID 0009-0001-0110-4173
# Doctrine v11 LOCKED 749/14/163 · Λ = Conjecture 1 · SLSA L1 honest
#
# FIX (stephenlutar2-hash, 2026-06-04): previous run failure was caused by
# anchore/sbom-action attempting upload-release-assets=true on a non-release push.
# The upload-release-assets option only works on `release` events and fails on push.
# Fix: guard upload-release-assets to release events only; disable on push/dispatch.

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  packages: read
  id-token: write

jobs:
  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Generate SBOM with Syft (CycloneDX)
        uses: anchore/sbom-action@ab5d7b5f48981941c4c5d6bf33aeb98fe3bae38c # v0.17.0
        with:
          output-file: sbom.cdx.json
          format: cyclonedx-json
          artifact-name: sbom.cdx.json
          upload-artifact: true
          # upload-release-assets only works on `release` events; disabled for push/dispatch
          upload-release-assets: ${{ github.event_name == 'release' }}

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@ef09cdac3e2d3e60d8ccadda691f4f1cec5035cb # v4.4.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90
