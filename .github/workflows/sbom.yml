name: SBOM

# FIX (Yachay, empire-reliability 2026-06-01): the caller pinned the org
# reusable workflows at .github SHA c8359e53, which PRE-DATES the creation of
# reusable-sbom.yml in that repo. The referenced reusable file did not exist at
# that SHA, so every SBOM run failed to resolve the workflow. Repoint to the
# current .github main HEAD (c9112b1e) where reusable-sbom.yml exists. This is
# the same reusable the passing flagships (amaru, sentra) consume.

on:
  push:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sbom:
    permissions:
      contents: write
    uses: szl-holdings/.github/.github/workflows/reusable-sbom.yml@c9112b1e62b178e89fc4da119fd47fa6982371f5 # .github main HEAD (reusable-sbom present)
