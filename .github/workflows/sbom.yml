name: SBOM (CycloneDX + SPDX, cosign-signed)

# SPDX-License-Identifier: Apache-2.0
# © 2026 Lutar, Stephen P. — SZL Holdings · ORCID 0009-0001-0110-4173
# Doctrine v11 LOCKED 749/14/163 · sovereign-default
#
# Self-contained software supply-chain pipeline (Warhacker / UDS Edition):
#  - Syft generates CycloneDX + SPDX SBOMs on every push to main AND every tag.
#  - Trivy runs a vulnerability scan (report-only on push; table output).
#  - Both SBOMs are uploaded as build artifacts.
#  - Cosign signs BOTH SBOMs with keyless OIDC (Sigstore Fulcio + Rekor).
#    No private key is stored or written to disk — SLSA L3 R3 compliant.
#    Each signing event is recorded in the public Rekor transparency log.
# Concepts only — no third-party logos or trademarks.
#
# CRYPTO-FIX: 2026-06-03 — Replaced key-based signing (SLSA L3 R3 violation)
#   with cosign keyless OIDC. Removed COSIGN_PRIVATE_KEY reference.
#   Both CycloneDX and SPDX SBOMs now Rekor-logged.
#   Ref: AUDIT_REPORT.md Finding C-2; COSIGN_REKOR_BRIEF.md §3.3

on:
  push:
    branches: [main]
    tags: ["v*", "*.*.*"]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sbom:
    name: Generate + sign SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # only used to attach SBOMs on a tagged release
      id-token: write   # required for cosign keyless OIDC (Fulcio/Rekor)
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@f5e124a5e5e1d497a692818ae907d3c45829d033 # v0.20.7

      - name: Generate CycloneDX SBOM (Syft)
        run: syft scan dir:. -o cyclonedx-json=sbom.cyclonedx.json

      - name: Generate SPDX SBOM (Syft)
        run: syft scan dir:. -o spdx-json=sbom.spdx.json

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@9ea583eb67910444b1f64abf338bd2e105a0a93d # v0.2.3
        with:
          version: v0.58.1

      - name: Trivy vulnerability scan (report-only)
        run: |
          trivy fs --scanners vuln --severity CRITICAL,HIGH,MEDIUM \
            --ignore-unfixed --exit-code 0 --format table .

      - name: Install Cosign
        uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159 # v3.9.2

      - name: Sign SBOMs with cosign keyless (Rekor-logged, no key on disk)
        # SLSA L3 R3 compliant: ephemeral ECDSA-P256 key generated in memory by
        # Fulcio (sigstore.dev); private key never written to runner filesystem.
        # id-token: write permission above allows GitHub OIDC token → Fulcio cert.
        # Each signing event is recorded in the public Rekor transparency log.
        # Verify with:
        #   cosign verify-blob \
        #     --certificate-identity-regexp "https://github.com/szl-holdings/.*" \
        #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
        #     --bundle sbom.cyclonedx.json.sigstore.json \
        #     sbom.cyclonedx.json
        run: |
          cosign sign-blob --yes \
            --bundle sbom.cyclonedx.json.sigstore.json \
            sbom.cyclonedx.json
          cosign sign-blob --yes \
            --bundle sbom.spdx.json.sigstore.json \
            sbom.spdx.json

      - name: Upload SBOM + bundle artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: |
            sbom.cyclonedx.json
            sbom.spdx.json
            sbom.cyclonedx.json.sigstore.json
            sbom.spdx.json.sigstore.json
          if-no-files-found: warn

      - name: Attach SBOMs to release
        if: github.event_name == 'release' || startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" \
            sbom.cyclonedx.json sbom.spdx.json \
            sbom.cyclonedx.json.sigstore.json sbom.spdx.json.sigstore.json \
            --clobber || true
