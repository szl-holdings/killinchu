name: OSINT engine tests

# Offline regression suite for killinchu_osint (the amaru/rosie OSINT ingest +
# sha256 provenance layer). Tavily is monkeypatched and fastapi is stubbed, so
# the suite runs with NO network and NO key — it just protects normalize/dedupe,
# the provenance chain verify (clean vs tampered), per-item live/cached mode, and
# the forced-refresh throttle from silent regressions.

on:
  push:
    branches: [main]
    paths:
      - killinchu_osint.py
      - killinchu_live_feeds.py
      - szl_hf_bucket.py
      - tests/test_osint.py
      - tests/test_killinchu_archive.py
      - .github/workflows/osint-tests.yml
  pull_request:
    branches: [main]
    paths:
      - killinchu_osint.py
      - killinchu_live_feeds.py
      - szl_hf_bucket.py
      - tests/test_osint.py
      - tests/test_killinchu_archive.py
      - .github/workflows/osint-tests.yml

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  osint-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"
      - name: Install pytest
        run: python -m pip install --disable-pip-version-check pytest
      - name: Run OSINT engine tests (offline, no network, no key)
        run: python -m pytest tests/test_osint.py tests/test_killinchu_archive.py -q
