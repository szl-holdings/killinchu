name: Scorecard

# SPDX-License-Identifier: Apache-2.0
# © 2026 Lutar, Stephen P. — SZL Holdings · ORCID 0009-0001-0110-4173
# Doctrine v11 LOCKED 749/14/163 · Λ = Conjecture 1 · SLSA L1 honest
#
# FIX (stephenlutar2-hash, 2026-06-04): startup_failure on push events was caused
# by the reusable scorecard calling upload-sarif via github/codeql-action, which
# requires GitHub Advanced Security (GHAS) on private repos. Removed push trigger;
# scorecard now runs only on the weekly schedule (Tuesdays at 05:41 UTC). SARIF
# upload is skipped via publish-results: false to avoid GHAS requirement.
#
# Note: ossf/scorecard-action has a known limitation on private repos without GHAS —
# the upload-sarif step fails. We run analysis only (no publish, no SARIF upload).
# This keeps the scorecard check in the CI graph without failing on push.

on:
  schedule:
    - cron: '41 5 * * 2'
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    uses: szl-holdings/.github/.github/workflows/reusable-scorecard.yml@c8359e53b40560f15ed5c25c3e4e1256b0536cf8 # v1 (.github main)
    with:
      publish-results: false
