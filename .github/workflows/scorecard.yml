name: Scorecard

# FIX (Yachay, empire-reliability 2026-06-01): two root causes made every run fail.
#  (1) The `branch_protection_rule` trigger runs without a checked-out commit context
#      and produces a `startup_failure` (the reusable workflow explicitly warns against
#      it). Removed.
#  (2) killinchu is a PRIVATE repo; `publish_results: true` requires public visibility
#      to publish to the OSSF public database, so the publish step failed. We pass
#      `publish-results: false` so the SARIF still uploads to the Security tab while the
#      unsupported public publish is disabled for this private repo.
on:
  schedule:
    - cron: '41 5 * * 2'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    uses: szl-holdings/.github/.github/workflows/reusable-scorecard.yml@c8359e53b40560f15ed5c25c3e4e1256b0536cf8 # v1 (.github main)
    with:
      publish-results: false
