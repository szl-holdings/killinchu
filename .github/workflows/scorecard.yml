name: Scorecard

# FIX (Yachay, empire-reliability 2026-06-01): two stacked root causes.
#  (1) The caller used a branch_protection_rule trigger, which runs without a
#      checked-out commit context and startup_failed the reusable analysis job.
#  (2) The org reusable-scorecard.yml uploads SARIF to GitHub code scanning and
#      publishes to the public OSSF database. killinchu is a PRIVATE repo
#      without GitHub Advanced Security / Code Security, so the code-scanning
#      upload is unavailable and public publishing is not applicable — same
#      limitation the CodeQL and SBOM workflows hit on this repo.
#
# Root-cause fix: run OSSF Scorecard self-contained on push to main + schedule.
# Keep publish_results:false and upload the SARIF as a build artifact only
# (no code-scanning push). If GHAS is later enabled on killinchu, switch back to
# the org reusable-scorecard.yml.

on:
  schedule:
    - cron: '41 5 * * 2'
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      actions: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run OSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          # Private repo without GHAS: do not publish to the public OSSF DB.
          publish_results: false

      - name: Upload Scorecard SARIF (artifact only)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: scorecard-results
          path: results.sarif
          retention-days: 7
          if-no-files-found: error
