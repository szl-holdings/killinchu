# knowledge-corpus-sync.yml — keep killinchu's knowledge.json byte-identical to
# a11oy's (the canonical, kernel-derived corpus) AND enforce Doctrine-v11 honesty.
# Doctrine v11 LOCKED 749/14/163 | SLSA L1 honest
# Signed-off-by: Yachay <yachay@szlholdings.ai>
#
# a11oy is the SOURCE OF TRUTH for knowledge.json (theorems / formulas / axioms +
# honesty labels). It regenerates the corpus on a new kernel commit or a
# formula/theorem change; killinchu must follow. The copy is currently manual, so
# without a guard killinchu silently serves a stale corpus with stale honesty
# labels.
#
# This guard checks out a11oy alongside killinchu and FAILS if:
#   * killinchu's knowledge.json is not byte-identical to a11oy's (sync drift), OR
#   * either corpus violates a Doctrine-v11 honesty invariant — Conjecture 1
#     (Λ-uniqueness / F23) must stay OPEN (never "proven"), the locked kernel count
#     must stay machine-pinned, Theorem U (if present) must stay conditional — so a
#     dishonest corpus can never be synced in silently.
#
# Complements shared-file-drift.yml (which incidentally keeps the two files
# identical because knowledge.json is a Dockerfile COPY source) by making the
# a11oy->killinchu direction explicit and by validating the corpus's honesty.
#
# Org policy compliance: github-owned actions only, SHA-pinned; checker + self-test
# are stdlib-only Python (no pip install, no third-party action).

name: Knowledge corpus in sync with a11oy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '37 6 * * 1'  # Mondays 06:37 UTC (offset from shared-file-drift 06:23)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  self-test:
    name: Validator self-test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - name: Run validator self-test (proves it catches drift + honesty regressions)
        run: python3 scripts/test_check_knowledge_corpus_sync.py

  corpus-sync:
    name: knowledge.json in sync with a11oy + honest
    needs: self-test
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout killinchu (this repo)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          path: self
      - name: Checkout a11oy (canonical sibling)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          repository: szl-holdings/a11oy
          ref: main
          path: sibling
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'
      - name: Compare knowledge.json + validate Doctrine-v11 honesty
        run: >-
          python3 self/scripts/check_knowledge_corpus_sync.py
          --self self/knowledge.json
          --sibling sibling/knowledge.json
          --self-name killinchu --sibling-name a11oy
